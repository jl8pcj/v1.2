<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RP2040 太鼓アーケードUI 完全版</title>
<style>
body{
  background:#0b0b0b;
  color:#fff;
  font-family:sans-serif;
  padding:20px;
}
h2{margin-bottom:10px;}
#status{font-size:18px;margin-bottom:15px;}
.dot{width:14px;height:14px;border-radius:50%;display:inline-block;margin-right:8px;}
.red{background:#ff4040;}
.yellow{background:#ffd000;}
.green{background:#00ff88;}
button{font-size:16px;padding:10px 16px;margin-right:10px;cursor:pointer;}
.channelCard{display:flex;flex-direction:column;align-items:center;justify-content:center;margin:10px;padding:10px;background:#151515;border:1px solid #333;width:200px;}
.sliderRow{display:flex;justify-content:space-between;width:100%;margin-bottom:10px;}
.sliderRow input{width:48%;}

/* メーター全体 */
.meterContainer{
  position:relative;
  width:500px;
  height:500px;
  margin:20px auto;
}

/* D/K リング */
.ring{
  position:absolute;
  width:450px;
  height:450px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;
  overflow:hidden;
}

/* 内側円 */
.ring.d .ringInner,
.ring.k .ringInner{
  position:absolute;
  width:320px;
  height:320px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:#0b0b0b;
  z-index:2;
}

/* 外周バー */
.ringContent{
  position:absolute;
  width:450px;
  height:450px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:1;
  overflow:hidden;
}

/* D 左半分バー */
.ring.d .ringContent{
  clip-path: polygon(0 0, calc(50% - 5px) 0, calc(50% - 5px) 100%, 0 100%);
  background:#222;
}

/* K 右半分バー */
.ring.k .ringContent{
  clip-path: polygon(calc(50% + 5px) 0, 100% 0, 100% 100%, calc(50% + 5px) 100%);
  background:#222;
}

/* バー */
.ringContent .meterBar{
  position:absolute;
  bottom:0;
  width:100%;
  height:0%;
  transition:height 0.02s linear, background 0.05s linear;
  background:linear-gradient(to top,#00ff88,#00cc66);
}

/* D/K 用ピークバー（非表示） */
.ringContent .peakBar{
  display:none;
  position:absolute;
  bottom:0;
  width:100%;
  height:3px;
  background:#fff;
  z-index:3;
}

/* F/J 中央 300px円 */
.circleContainer{
  position:absolute;
  top:50%;
  left:50%;
  width:300px;
  height:300px;
  transform:translate(-50%,-50%);
  display:flex;
  justify-content:center;
  align-items:flex-end;
}
.meterWrap.f,.meterWrap.j{
  position:relative;
  height:300px;
  overflow:hidden;
  background:#333;
}
.meterWrap.f{
  width:145px;
  border-radius:150px 0 0 150px;
  margin-right:5px;
}
.meterWrap.j{
  width:145px;
  border-radius:0 150px 150px 0;
  margin-left:5px;
}
.meterWrap.f .meterBar,.meterWrap.j .meterBar{
  position:absolute;
  bottom:0;
  width:100%;
  height:0%;
  background:linear-gradient(to top,#ff4040,#ff0000);
}
.meterWrap.f .peakBar,.meterWrap.j .peakBar{
  display:none;
  position:absolute;
  bottom:0;
  width:100%;
  height:3px;
  background:#fff;
}

/* メッセージボックス（カーソル非表示） */
#messageBox{
  position:absolute;
  left:520px;
  top:50%;
  transform:translateY(-50%);
  width:200px;
  height:120px;
  background:#111;
  color:#0f0;
  border:1px solid #333;
  padding:6px;
  font-size:14px;
  font-family:sans-serif;
  resize:none;
  overflow-y:auto;
  caret-color: transparent;
}
</style>
</head>
<body>
<h2>Doncon 感度調整1</h2>
<div id="status">
  <span id="led" class="dot red"></span>
  <span id="statText">DISCONNECTED</span>
</div>
<button id="connectBtn">接続</button>
<button id="saveBtn">SAVE</button>
<div id="channels" style="display:flex; justify-content:space-around; flex-wrap:wrap;"></div>
<div class="meterContainer" id="meterContainer"></div>

<script>
let port, reader, writer;
let lastReceive=0;
const names=["左カッ","左ドン","右ドン","右カッ"];
let peaks=[0,0,0,0];
let flashTimers=[0,0,0,0];
const led=document.getElementById("led");
const statText=document.getElementById("statText");
const channels=document.getElementById("channels");
const meterContainer=document.getElementById("meterContainer");
const saveBtn=document.getElementById("saveBtn");

function setStatus(text,color){
  statText.textContent=text;
  led.className="dot "+color;
}

/* ================= UI ================= */
function createUI(){
  channels.innerHTML="";
  meterContainer.innerHTML="";

  // Dリング
  const dRing=document.createElement("div");
  dRing.className="ring d";
  const dInner=document.createElement("div");
  dInner.className="ringInner";
  const dContent=document.createElement("div");
  dContent.className="ringContent";
  const dBar=document.createElement("div");
  dBar.className="meterBar";
  dBar.id="bar0";
  dContent.appendChild(dBar);
  const dPeak=document.createElement("div");
  dPeak.className="peakBar";
  dPeak.id="peak0";
  dContent.appendChild(dPeak);
  dRing.appendChild(dInner);
  dRing.appendChild(dContent);
  meterContainer.appendChild(dRing);

  // Kリング
  const kRing=document.createElement("div");
  kRing.className="ring k";
  const kInner=document.createElement("div");
  kInner.className="ringInner";
  const kContent=document.createElement("div");
  kContent.className="ringContent";
  const kBar=document.createElement("div");
  kBar.className="meterBar";
  kBar.id="bar3";
  kContent.appendChild(kBar);
  const kPeak=document.createElement("div");
  kPeak.className="peakBar";
  kPeak.id="peak3";
  kContent.appendChild(kPeak);
  kRing.appendChild(kInner);
  kRing.appendChild(kContent);
  meterContainer.appendChild(kRing);

  // F/J 中央
  const circleContainer=document.createElement("div");
  circleContainer.className="circleContainer";

  const fWrap=document.createElement("div");
  fWrap.className="meterWrap f";
  const fBar=document.createElement("div");
  fBar.className="meterBar";
  fBar.id="bar1";
  const fPeak=document.createElement("div");
  fPeak.className="peakBar";
  fPeak.id="peak1";
  fWrap.appendChild(fBar);
  fWrap.appendChild(fPeak);

  const jWrap=document.createElement("div");
  jWrap.className="meterWrap j";
  const jBar=document.createElement("div");
  jBar.className="meterBar";
  jBar.id="bar2";
  const jPeak=document.createElement("div");
  jPeak.className="peakBar";
  jPeak.id="peak2";
  jWrap.appendChild(jBar);
  jWrap.appendChild(jPeak);

  circleContainer.appendChild(fWrap);
  circleContainer.appendChild(jWrap);
  meterContainer.appendChild(circleContainer);

  // メッセージボックス追加（カーソル非表示）
  const msgBox = document.createElement("textarea");
  msgBox.id = "messageBox";
  msgBox.placeholder = "任意メッセージ入力";
  meterContainer.appendChild(msgBox);

  // スライダー UI
  for(let i=0;i<4;i++){
    const div=document.createElement("div");
    div.className="channelCard";
    div.innerHTML=`<h3>${names[i]}</h3>
      <div class="sliderRow vertical">
        <label>gain</label>
        <input type="range" min="0.5" max="5" step="0.1" value="1">
      </div>
      <div class="sliderRow vertical">
        <label>threshold</label>
        <input type="range" min="1000" max="40000" step="500" value="15000">
      </div>`;
    channels.appendChild(div);
  }
}

// SAVEボタンイベント（例）
saveBtn.onclick = () => { alert("SAVE command"); };

// 初期UI生成
createUI();
</script>
</body>
</html>
