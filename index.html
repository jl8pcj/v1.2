<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>RP2040 太鼓アーケードUI 完全版（Kリング修正版）</title>
<style>
body{
  background:#0b0b0b;
  color:#fff;
  font-family:sans-serif;
  padding:20px;
}
h2{margin-bottom:10px;}
#status{font-size:18px;margin-bottom:15px;}
.dot{width:14px;height:14px;border-radius:50%;display:inline-block;margin-right:8px;}
.red{background:#ff4040;}
.yellow{background:#ffd000;}
.green{background:#00ff88;}
button{font-size:16px;padding:10px 16px;margin-right:10px;cursor:pointer;}
.channelCard{display:flex;flex-direction:column;align-items:center;justify-content:center;margin:10px;padding:10px;background:#151515;border:1px solid #333;width:120px;}
.sliderRow{display:flex;justify-content:space-between;width:100%;margin-bottom:10px;}
.sliderRow input{width:48%;}

.meterContainer{
  position:relative;
  width:500px;
  height:500px;
  margin:20px auto;
}

/* D/K リング */
.ring{
  position:absolute;
  width:450px;
  height:450px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;
  overflow:hidden;
}

/* Dリング内円 */
.ring.d .ringInner{
  position:absolute;
  width:320px;
  height:320px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:#0b0b0b;
}

/* Kリング内円（修正版） */
.ring.k .ringInner{
  position:absolute;
  width:320px; /* Fと同じ */
  height:320px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:#0b0b0b;
}

/* リングバー用コンテンツ */
.ringContent{
  position:absolute;
  width:100%;
  height:100%;
}

/* 左右半分に分割 + 10pxクリアランス */
.ring.d .ringContent{
  clip-path: polygon(0 0, 50% 0, 50% 100%, 0 100%);
  left:-5px;
  background:#333;
}
.ring.k .ringContent{
  clip-path: polygon(50% 0, 100% 0, 100% 100%, 50% 100%);
  left:0;
  background:#333;
}

/* バー */
.ringContent .meterBar{
  position:absolute;
  bottom:0;
  width:100%;
  height:0%;
  transition:height 0.02s linear, background 0.05s linear;
  background:linear-gradient(to top,#00ff88,#00cc66); /* 緑系 */
}

/* F/J 中央 300px円 */
.circleContainer{
  position:absolute;
  top:50%;
  left:50%;
  width:300px;
  height:300px;
  transform:translate(-50%,-50%);
  display:flex;
  justify-content:center;
  align-items:flex-end;
}
.meterWrap.f,.meterWrap.j{
  position:relative;
  height:300px;
  overflow:hidden;
  background:#333;
}
.meterWrap.f{
  width:145px;
  border-radius:150px 0 0 150px;
  margin-right:5px;
}
.meterWrap.j{
  width:145px;
  border-radius:0 150px 150px 0;
  margin-left:5px;
}

/* F/J バー */
.meterWrap.f .meterBar,.meterWrap.j .meterBar{
  position:absolute;
  bottom:0;
  width:100%;
  height:0%;
  background:linear-gradient(to top,#ff4040,#ff0000); /* 赤系 */
}

.peakBar{
  position:absolute;
  bottom:0;
  width:100%;
  height:3px;
  background:#fff;
}
</style>
</head>
<body>

<h2>RP2040 太鼓アーケードUI 完全版（Kリング修正版）</h2>
<div id="status">
  <span id="led" class="dot red"></span>
  <span id="statText">DISCONNECTED</span>
</div>

<button id="connectBtn">接続</button>
<button id="saveBtn">SAVE</button>

<div id="channels" style="display:flex; justify-content:space-around; flex-wrap:wrap;"></div>

<div class="meterContainer" id="meterContainer"></div>

<script>
// JSは既存のUI作成ロジックを修正するだけ
function createUI(){
  const meterContainer=document.getElementById("meterContainer");
  meterContainer.innerHTML="";

  // Dリング
  const dRing=document.createElement("div"); dRing.className="ring d";
  const dInner=document.createElement("div"); dInner.className="ringInner";
  const dContent=document.createElement("div"); dContent.className="ringContent";
  const dBar=document.createElement("div"); dBar.className="meterBar"; dBar.id="bar0";
  dContent.appendChild(dBar);
  dRing.appendChild(dInner);
  dRing.appendChild(dContent);
  meterContainer.appendChild(dRing);

  // Kリング（修正版）
  const kRing=document.createElement("div"); kRing.className="ring k";
  const kInner=document.createElement("div"); kInner.className="ringInner";
  kRing.appendChild(kInner);
  const kContent=document.createElement("div"); kContent.className="ringContent";
  const kBar=document.createElement("div"); kBar.className="meterBar"; kBar.id="bar3";
  kContent.appendChild(kBar);
  kRing.appendChild(kContent);
  meterContainer.appendChild(kRing);

  // F/J 中央
  const circleContainer=document.createElement("div"); circleContainer.className="circleContainer";
  const fWrap=document.createElement("div"); fWrap.className="meterWrap f";
  const fBar=document.createElement("div"); fBar.className="meterBar"; fBar.id="bar1";
  const fPeak=document.createElement("div"); fPeak.className="peakBar"; fPeak.id="peak1";
  fWrap.appendChild(fBar); fWrap.appendChild(fPeak);

  const jWrap=document.createElement("div"); jWrap.className="meterWrap j";
  const jBar=document.createElement("div"); jBar.className="meterBar"; jBar.id="bar2";
  const jPeak=document.createElement("div"); jPeak.className="peakBar"; jPeak.id="peak2";
  jWrap.appendChild(jBar); jWrap.appendChild(jPeak);

  circleContainer.appendChild(fWrap);
  circleContainer.appendChild(jWrap);
  meterContainer.appendChild(circleContainer);
}

// 最初にUI作成
createUI();
</script>
</body>
</html>
