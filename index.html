<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>RP2040 Control</title>
</head>

<body>

<h2>RP2040 Settings</h2>

<button onclick="connect()">USB接続</button> <button onclick="save()">SAVE</button>

<p id="status">未接続</p>

<script>

let port;
let writer;

async function connect() {

    port = await navigator.serial.requestPort();
    await port.open({ baudRate: 115200 });

    writer = port.writable.getWriter();

    document.getElementById("status").innerText = "接続OK";
}

async function save() {

    if (!writer) return;

    const data = new TextEncoder().encode("SAVE\n");
    await writer.write(data);

    document.getElementById("status").innerText = "保存要求送信";
}

</script>

</body>
</html>
