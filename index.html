<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>RP2040 Settings</title>

<style>
body{
    font-family:sans-serif;
    padding:20px;
    max-width:500px;
}

h2{
    margin-bottom:10px;
}

.sliderBox{
    margin-top:20px;
}

.value{
    font-weight:bold;
    margin-left:10px;
}

button{
    font-size:16px;
    margin-right:10px;
    padding:6px 12px;
}
</style>

</head>

<body>

<h2>RP2040 設定</h2>

<button onclick="connect()">USB接続</button> <button onclick="save()">SAVE</button>

<p id="status">未接続</p>

<div class="sliderBox">
<label>Threshold</label><br>
<input type="range" id="threshold"
       min="0" max="65535" value="30000">
<span class="value" id="thresholdValue">30000</span>
</div>

<script>

let port;
let writer;
let reader;

const statusText =
    document.getElementById("status");

const threshold =
    document.getElementById("threshold");

const thresholdValue =
    document.getElementById("thresholdValue");

// ============================
// スライダー操作（保存しない）
// ============================
threshold.oninput = () => {
    thresholdValue.textContent =
        threshold.value;

    sendLive();
};

// ============================
// USB接続
// ============================
async function connect(){

    try{

        port = await navigator.serial.requestPort();
        await port.open({ baudRate:115200 });

        writer = port.writable.getWriter();
        reader = port.readable.getReader();

        statusText.textContent = "接続OK";

        readLoop();

        // 接続通知（設定要求）
        await writer.write(
            new TextEncoder().encode("HELLO\n")
        );

    }catch(e){
        statusText.textContent = "接続失敗";
        console.error(e);
    }
}

// ============================
// RP2040 → HTML 受信
// ============================
async function readLoop(){

    const decoder = new TextDecoder();

    while(true){

        const { value, done } =
            await reader.read();

        if(done) break;

        const text =
            decoder.decode(value).trim();

        console.log("RP2040:", text);

        // 設定同期
        if(text.startsWith("SETTINGS ")){

            const data =
                JSON.parse(text.substring(9));

            if(data.threshold !== undefined){
                threshold.value = data.threshold;
                thresholdValue.textContent =
                    data.threshold;
            }

            statusText.textContent =
                "設定同期OK";
        }

        // 保存成功
        else if(text === "SAVED"){
            statusText.textContent =
                "✅ 保存完了";
        }

        // エラー
        else if(text.startsWith("ERROR")){
            statusText.textContent =
                "❌ " + text;
        }
    }
}

// ============================
// リアルタイム送信
// ============================
async function sendLive(){

    if(!writer) return;

    const obj = {
        threshold:
            Number(threshold.value)
    };

    const msg =
        "SET " + JSON.stringify(obj) + "\n";

    await writer.write(
        new TextEncoder().encode(msg)
    );
}

// ============================
// SAVEボタン
// ============================
async function save(){

    if(!writer) return;

    statusText.textContent = "保存中...";

    await writer.write(
        new TextEncoder().encode("SAVE\n")
    );
}

</script>

</body>
</html>
