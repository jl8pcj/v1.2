<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RP2040 太鼓アーケードUI F/J + D/Kリング K内径調整10px</title>
<style>
body{
  background:#0b0b0b;
  color:#fff;
  font-family:sans-serif;
  padding:20px;
}
h2{margin-bottom:10px;}
#status{font-size:18px;margin-bottom:15px;}
.dot{width:14px;height:14px;border-radius:50%;display:inline-block;margin-right:8px;}
.red{background:#ff4040;}
.yellow{background:#ffd000;}
.green{background:#00ff88;}
button{font-size:16px;padding:10px 16px;margin-right:10px;cursor:pointer;}
.channelCard{display:flex;flex-direction:column;align-items:center;justify-content:center;margin:10px;padding:10px;background:#151515;border:1px solid #333;width:120px;}
.sliderRow{display:flex;justify-content:space-between;width:100%;margin-bottom:10px;}
.sliderRow input{width:48%;}

.meterContainer{
  position:relative;
  width:500px;
  height:500px;
  margin:20px auto;
}

/* 外側リング D/K */
.ring{
  position:absolute;
  width:450px;
  height:450px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;
  overflow:hidden;
}

.ringInner{
  position:absolute;
  width:320px; /* Dリングはそのまま */
  height:320px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:#0b0b0b;
}

/* Kリングだけ内径拡大して中央と10pxクリアランス */
.ring.k .ringInner{
  width:330px;
  height:330px;
  background:#0b0b0b;
}

.ringContent{
  position:absolute;
  width:100%;
  height:100%;
}

/* 左右半分に分割 + 10pxクリアランス */
.ring.d .ringContent{
  clip-path: polygon(0 0, 50% 0, 50% 100%, 0 100%);
  left:-5px; /* 10px分クリアランス半分ずつ */
  background:#333; /* 下がっている部分はグレー */
}
.ring.k .ringContent{
  clip-path: polygon(50% 0, 100% 0, 100% 100%, 50% 100%);
  left:0; /* 内径拡大で自動的に中央と10px隙間 */
  background:#333; /* 下がっている部分はグレー */
}

.ringContent .meterBar{
  position:absolute;
  bottom:0;
  width:100%;
  height:0%;
  transition:height 0.02s linear, background 0.05s linear;
  background:linear-gradient(to top,#00ff88,#00cc66); /* 緑系 */
}

/* F/J 中央 300px円 */
.circleContainer{
  position:absolute;
  top:50%;
  left:50%;
  width:300px;
  height:300px;
  transform:translate(-50%,-50%);
  display:flex;
  justify-content:center;
  align-items:flex-end;
}
.meterWrap.f,.meterWrap.j{
  position:relative;
  height:300px;
  overflow:hidden;
  background:#333; /* 下がっている部分はグレー */
}
.meterWrap.f{
  width:145px;
  border-radius:150px 0 0 150px;
  margin-right:5px;
}
.meterWrap.j{
  width:145px;
  border-radius:0 150px 150px 0;
  margin-left:5px;
}

/* F/J バー */
.meterWrap.f .meterBar,.meterWrap.j .meterBar{
  position:absolute;
  bottom:0;
  width:100%;
  height:0%;
  background:linear-gradient(to top,#ff4040,#ff0000); /* 赤系 */
}

.peakBar{
  position:absolute;
  bottom:0;
  width:100%;
  height:3px;
  background:#fff;
}
</style>
</head>
<body>

<h2>RP2040 太鼓アーケードUI F/J + D/Kリング K内径調整10px</h2>
<div id="status">
  <span id="led" class="dot red"></span>
  <span id="statText">DISCONNECTED</span>
</div>

<button id="connectBtn">接続</button>
<button id="saveBtn">SAVE</button>

<div id="channels" style="display:flex; justify-content:space-around; flex-wrap:wrap;"></div>

<div class="meterContainer" id="meterContainer"></div>

<script>
let port, reader, writer;
let lastReceive=0;
const names=["D","F","J","K"];
let peaks=[0,0,0,0];
let flashTimers=[0,0,0,0];

const led=document.getElementById("led");
const statText=document.getElementById("statText");
const channels=document.getElementById("channels");
const connectBtn=document.getElementById("connectBtn");
const saveBtn=document.getElementById("saveBtn");
const meterContainer=document.getElementById("meterContainer");

function setStatus(text,color){
  statText.textContent=text;
  led.className="dot "+color;
}

/* ================= CONNECT ================= */
connectBtn.onclick=async()=>{
  try{
    setStatus("CONNECTING...","yellow");
    port=await navigator.serial.requestPort();
    await port.open({baudRate:115200});
    writer=port.writable.getWriter();
    reader=port.readable.getReader();
    createUI();
    setStatus("CONNECTED","green");
    startRead();
    send({cmd:"get_settings"});
  }catch(e){console.error(e); setStatus("FAILED","red");}
};

/* ================= UI ================= */
function createUI(){
  channels.innerHTML="";
  meterContainer.innerHTML="";

  // Dリング
  const dRing=document.createElement("div"); dRing.className="ring d";
  const dInner=document.createElement("div"); dInner.className="ringInner";
  const dContent=document.createElement("div"); dContent.className="ringContent";
  const dBar=document.createElement("div"); dBar.className="meterBar"; dBar.id="bar0";
  dContent.appendChild(dBar);
  dRing.appendChild(dInner);
  dRing.appendChild(dContent);
  meterContainer.appendChild(dRing);

  // Kリング
  const kRing=document.createElement("div"); kRing.className="ring k";
  const kInner=document.createElement("div"); kInner.className="ringInner";
  const kContent=document.createElement("div"); kContent.className="ringContent";
  const kBar=document.createElement("div"); kBar.className="meterBar"; kBar.id="bar3";
  kContent.appendChild(kBar);
  kRing.appendChild(kInner);
  kRing.appendChild(kContent);
  meterContainer.appendChild(kRing);

  // F/J 中央
  const circleContainer=document.createElement("div"); circleContainer.className="circleContainer";
  const fWrap=document.createElement("div"); fWrap.className="meterWrap f";
  const fBar=document.createElement("div"); fBar.className="meterBar"; fBar.id="bar1";
  const fPeak=document.createElement("div"); fPeak.className="peakBar"; fPeak.id="peak1";
  fWrap.appendChild(fBar); fWrap.appendChild(fPeak);

  const jWrap=document.createElement("div"); jWrap.className="meterWrap j";
  const jBar=document.createElement("div"); jBar.className="meterBar"; jBar.id="bar2";
  const jPeak=document.createElement("div"); jPeak.className="peakBar"; jPeak.id="peak2";
  jWrap.appendChild(jBar); jWrap.appendChild(jPeak);

  circleContainer.appendChild(fWrap);
  circleContainer.appendChild(jWrap);
  meterContainer.appendChild(circleContainer);

  // スライダー UI
  for(let i=0;i<4;i++){
    const div=document.createElement("div"); div.className="channelCard";
    div.innerHTML=`<h3>${names[i]}</h3>
      <div class="sliderRow">
        <input type="range" min="0.5" max="5" step="0.1" value="1" oninput="sendParam(${i},this.value,'gain')">
        <input type="range" min="1000" max="40000" step="500" value="15000" oninput="sendParam(${i},this.value,'threshold')">
      </div>`;
    channels.appendChild(div);
  }
}

/* ================= SEND ================= */
function send(obj){if(writer) writer.write(new TextEncoder().encode(JSON.stringify(obj)+"\n"));}

function sendParam(ch,val,type){send({cmd:"set", ch:ch, type:type, value:parseFloat(val)});}
saveBtn.onclick=()=>{setStatus("SAVING","yellow");send({cmd:"save"});} ;

/* ================= METER ================= */
function updateMeter(ch,value){
  const percent=Math.min(100,(value/65535)*100);
  const bar=document.getElementById("bar"+ch);
  bar.style.height=percent+"%"; // 下から上
  if(percent>70){bar.style.background="white"; flashTimers[ch]=5;}
  if(flashTimers[ch]>0){flashTimers[ch]--; if(flashTimers[ch]==0){
    if(ch==0||ch==3) bar.style.background="linear-gradient(to top,#00ff88,#00cc66)";
    else bar.style.background="linear-gradient(to top,#ff4040,#ff0000)";
  }}
  if(value>peaks[ch]) peaks[ch]=value;
  const peak=document.getElementById("peak"+ch);
  const peakPercent=(peaks[ch]/65535)*100;
  peak.style.bottom=peakPercent+"%";
}

/* peak decay */
setInterval(()=>{for(let i=0;i<4;i++) peaks[i]*=0.92;},40);

/* ================= READ ================= */
async function startRead(){
  const decoder=new TextDecoder();
  let buffer="";
  while(true){
    const {value,done}=await reader.read();
    if(done){setStatus("DISCONNECTED","red"); break;}
    lastReceive=Date.now();
    buffer+=decoder.decode(value);
    let lines=buffer.split("\n"); buffer=lines.pop();
    for(const line of lines){
      if(!line.startsWith("{")) continue;
      try{
        const data=JSON.parse(line);
        if(data.type==="adc"){setStatus("RECEIVING DATA","green");updateMeter(data.ch,data.value);}
        if(data.type==="saved") setStatus("SAVED ✓","green");
        if(data.type==="save_error") setStatus("SAVE ERROR","red");
        if(data.type==="settings"){
          const sliders=document.querySelectorAll(".sliderRow input");
          for(let i=0;i<4;i++){sliders[i*2].value=data.gain[i]; sliders[i*2+1].value=data.threshold[i];}
          setStatus("SETTINGS LOADED","green");
        }
      }catch(e){}
    }
  }
}

/* ================= WATCHDOG ================= */
setInterval(()=>{if(Date.now()-lastReceive>1500) setStatus("NO DATA","red");},500);
</script>
</body>
</html>
