<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>RP2040 太鼓アーケードUI SVG版</title>
<style>
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  svg {
    overflow: visible;
  }
</style>
</head>
<body>

<svg id="arcadeUI" width="500" height="500">
  <!-- 外側リング D/K -->
  <!-- D 左半分 -->
  <path id="ringD" fill="url(#gradD)"></path>
  <!-- K 右半分 -->
  <path id="ringK" fill="url(#gradK)"></path>

  <!-- 中央円 F/J -->
  <circle cx="250" cy="250" r="150" fill="#333"/>
  <!-- 中央縦線 10px 隙間 -->
  <rect x="245" y="100" width="10" height="300" fill="#000"/>

  <!-- F/J バー -->
  <rect id="barF" x="100" y="250" width="140" height="0" fill="url(#gradF)"/>
  <rect id="barJ" x="260" y="250" width="140" height="0" fill="url(#gradJ)"/>

  <!-- 定義グラデーション -->
  <defs>
    <linearGradient id="gradD" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00cc66"/>
      <stop offset="100%" stop-color="#00ff88"/>
    </linearGradient>
    <linearGradient id="gradK" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00cc66"/>
      <stop offset="100%" stop-color="#00ff88"/>
    </linearGradient>
    <linearGradient id="gradF" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ff4040"/>
      <stop offset="100%" stop-color="#ff0000"/>
    </linearGradient>
    <linearGradient id="gradJ" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ff4040"/>
      <stop offset="100%" stop-color="#ff0000"/>
    </linearGradient>
  </defs>
</svg>

<script>
const cx = 250;
const cy = 250;
const outerR = 225;
const innerR = 160; // 320px直径 → 半径160px
const clearance = 10; // 中央円との隙間

// 左右半円用のパス作成
function semiCirclePath(cx, cy, rOuter, rInner, side) {
  const sweep = side === "left" ? 0 : 1;
  const startAngle = side === "left" ? Math.PI/2 : -Math.PI/2;
  const endAngle = side === "left" ? 3*Math.PI/2 : Math.PI/2;

  const x1 = cx + rOuter * Math.cos(startAngle);
  const y1 = cy + rOuter * Math.sin(startAngle);
  const x2 = cx + rOuter * Math.cos(endAngle);
  const y2 = cy + rOuter * Math.sin(endAngle);

  const x3 = cx + rInner * Math.cos(endAngle);
  const y3 = cy + rInner * Math.sin(endAngle);
  const x4 = cx + rInner * Math.cos(startAngle);
  const y4 = cy + rInner * Math.sin(startAngle);

  return `M ${x1},${y1} A ${rOuter},${rOuter} 0 0,1 ${x2},${y2} L ${x3},${y3} A ${rInner},${rInner} 0 0,0 ${x4},${y4} Z`;
}

// 左右半分のパスを設定
document.getElementById("ringD").setAttribute("d", semiCirclePath(cx, cy, outerR, innerR, "left"));
document.getElementById("ringK").setAttribute("d", semiCirclePath(cx, cy, outerR, innerR - clearance, "right"));

// バーを下から上に伸ばす関数
function setBarHeight(barId, percent) {
  const bar = document.getElementById(barId);
  const maxHeight = 300; // 中央円の直径
  bar.setAttribute("y", 250 - percent/100*maxHeight);
  bar.setAttribute("height", percent/100*maxHeight);
}

// デモ用でランダムにバーを動かす
setInterval(()=>{
  setBarHeight("barF", Math.random()*100);
  setBarHeight("barJ", Math.random()*100);
},100);

</script>

</body>
</html>
